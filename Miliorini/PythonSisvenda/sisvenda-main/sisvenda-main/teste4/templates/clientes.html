<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SisVenda - Clientes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="sidebar">
        <h2>SISVENDA</h2>
        <nav>
            <a href="/dashboard">Início</a>
            <a href="/vendas">Vendas</a>
            <a href="/produtos">Estoque</a>
            <a href="/clientes">Clientes</a>
            <a href="/logout">Sair</a>
        </nav>
    </div>
    <div class="content">
        <h2>Cadastrar Cliente</h2>
        <div class="card">
            <form method="POST">
                <input type="text" name="nome" placeholder="Nome Completo" required>
                <input type="text" name="cpf" placeholder="CPF (Apenas números)" required>
                <input type="text" name="tel" placeholder="Telefone" required>
                <button type="submit" class="btn-success">Cadastrar</button>
            </form>
        </div>
    <div class="card">
        <h3>Lista de Clientes</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Telefone</th>
                    <th>Senha</th> </tr>
            </thead>
            <tbody>
                {% for c in clientes %}
                <tr>
                    <td>{{ c.id }}</td>
                    <td>{{ c.nome }}</td>
                    <td>{{ c.cpf }}</td>
                    <td>{{ c.telefone }}</td>
                    <td><code>{{ c.senha }}</code></td> </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
