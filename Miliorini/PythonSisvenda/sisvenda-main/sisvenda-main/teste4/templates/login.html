<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - SisVenda</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#2c3e50; margin:0; font-family: sans-serif;">
    <div style="background:white; padding:40px; border-radius:12px; width:320px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
        <h2 style="color:#2c3e50; margin-bottom:20px;">SISVENDA</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <p style="color:#e74c3c; background:#fadbd8; padding:10px; border-radius:5px; font-size:14px;">{{ messages[0] }}</p>
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <input type="text" name="usuario" placeholder="Usuário" required style="width:100%; margin:10px 0; padding:12px; border:1px solid #ddd; border-radius:6px; box-sizing: border-box;">
            <input type="password" name="senha" placeholder="Senha" required style="width:100%; margin:10px 0; padding:12px; border:1px solid #ddd; border-radius:6px; box-sizing: border-box;">
            <button type="submit" style="width:100%; padding:12px; background:#3498db; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; margin-top:10px;">ENTRAR</button>
        </form>
    </div>
</body>
</html>
