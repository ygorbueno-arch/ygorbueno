<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SisVenda - Vendas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <h2>SISVENDA</h2>
        <nav>
            <a href="/dashboard">Início</a>
            <a href="/vendas">Vendas</a>
            <a href="/produtos">Estoque</a>
            <a href="/clientes">Clientes</a>
            <a href="/logout">Sair</a>
        </nav>
    </div>
    <div class="content">
        <h2>Registrar Nova Venda</h2>
        <div class="card">
            <form method="POST">
                <select name="produto_id" required>
                    <option value="">Selecione o Produto</option>
                    {% for p in produtos %}
                    <option value="{{ p.id }}">{{ p.nome }} - R$ {{ p.preco }} (Estoque: {{ p.estoque }})</option>
                    {% endfor %}
                </select>
                <input type="number" name="quantidade" placeholder="Quantidade" required>
                <button type="submit" class="btn-success">Finalizar Venda</button>
            </form>
        </div>

        <h2>Histórico de Vendas</h2>
        <div class="card">
            <table>
                <tr><th>Data</th><th>Produto</th><th>Qtd</th><th>Total</th></tr>
                {% for v in vendas %}
                <tr>
                    <td>{{ v.data }}</td>
                    <td>{{ v.nome }}</td>
                    <td>{{ v.quantidade }}</td>
                    <td>R$ {{ "%.2f"|format(v.total) }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</body>
</html>
