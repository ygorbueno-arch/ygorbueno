<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SisVenda - Funcionários</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="sidebar">
        <h2>SISVENDA</h2>
        <nav>
            <a href="/dashboard">Início</a>
            <a href="/logout">Sair</a>
        </nav>
    </div>
    <div class="content">
        <h2>Novo Funcionário</h2>
        <div class="card">
            <form method="POST">
                <input type="text" name="u" placeholder="Nome de Usuário" required>
                <input type="password" name="s" placeholder="Senha" required>
                <button type="submit" class="btn-success">Criar Acesso</button>
            </form>
        </div>
        <div class="card">
            <h3>Usuários Ativos</h3>
            <ul>
                {% for u in usuarios %}
                <li>ID: {{ u.id }} - <strong>{{ u.username }}</strong></li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
